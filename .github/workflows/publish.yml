name: Publish

on:
  push:
    tags:
      - "v*"

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

env:
  PNPM_VERSION: 9.15.2

jobs:
  # ── Guard: full suite must pass before publishing ────────────────────────────
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test

  # ── Publish to npm ───────────────────────────────────────────────────────────
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
      id-token: write   # required for npm provenance
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      # Trusted publishing requires npm ≥ 11.5.1 (Node 22 ships with npm 10.x)
      - run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      # Ensure the version in package.json matches the Git tag
      - name: Assert version matches tag
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$PKG_VERSION" != "${{ github.ref_name }}" ]; then
            echo "❌ package.json version ($PKG_VERSION) does not match tag (${{ github.ref_name }})"
            exit 1
          fi

      - name: Publish
        run: pnpm publish --no-git-checks --provenance --access public
